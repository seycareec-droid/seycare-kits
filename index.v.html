<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seycare Kits - Cotizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #d1d5db #f3f4f6; }
        *::-webkit-scrollbar { width: 6px; height: 6px; }
        *::-webkit-scrollbar-track { background: #f3f4f6; }
        *::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-pink-50 to-white">
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = "https://yaxdcfrvcmkrwunpkpyj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGRjZnJ2Y21rcnd1bnBrcHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Mjk2MDEsImV4cCI6MjA5NTEwNTYwMX0.ZGO3b6WuoaBRGjjrRIgsVStlLc1Xr7nYfCyt4mEQDyo";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const USER_ID = "00000000-0000-0000-0000-000000000001";

const KIT_TEMPLATES = {
    "Kit Limpieza y Esmaltado": [
        { match: "Drill GN", qty: 1 }, { match: "Palito de naranjo", qty: 1 },
        { match: "Broca flama", qty: 1 }, { match: "Tijera para tips y molde", qty: 1 },
        { match: "Cepillo limpieza", qty: 1 }, { match: "Lima 180/240 mineral", qty: 3 },
        { match: "Lámpara UV/LED 48W", qty: 1 }, { match: "Top Brillante", qty: 1 },
        { match: "Base coat", qty: 1 },
    ],
    "Kit Polygel": [
        { match: "Polygel GN", qty: 1 }, { match: "Pincel/espátula polygel", qty: 1 },
        { match: "Lámpara portátil", qty: 1 },
    ],
    "Kit Acrílico": [
        { match: "Monomero 30ml", qty: 1 }, { match: "Acrílico Cover", qty: 1 },
        { match: "Pincel acrílico (sintético)", qty: 1 }, { match: "Tips coffin", qty: 1 },
    ],
    "Kit Profesional Completo": [
        { match: "Drill GN", qty: 1 }, { match: "Palito de naranjo", qty: 2 },
        { match: "Fresa Flama Staleks", qty: 1 }, { match: "Tijera cutícula 51", qty: 1 },
        { match: "Alicate para cutícula 30", qty: 1 }, { match: "Lima 180/180 mineral", qty: 1 },
        { match: "Lima 180/240 mineral", qty: 1 }, { match: "Lima 150/150 mineral", qty: 1 },
        { match: "Wipes Staleks", qty: 1 }, { match: "Cepillo limpieza", qty: 1 },
        { match: "Lámpara UV/LED 48W", qty: 1 }, { match: "Deshidratador", qty: 1 },
        { match: "Adherente", qty: 1 }, { match: "Base coat", qty: 1 },
        { match: "Base Rubber Transparente", qty: 1 }, { match: "Gel de construcción Linda", qty: 1 },
        { match: "Top Brillante", qty: 1 }, { match: "Top matte", qty: 1 },
    ],
    "Sistema Polygel Completo": [
        { match: "Tips coffin", qty: 1 }, { match: "Molde esculpidas", qty: 1 },
        { match: "Polygel GN", qty: 1 }, { match: "Polygel linda", qty: 1 },
        { match: "Pincel/espátula polygel", qty: 1 },
    ],
    "Sistema Acrílico Completo": [
        { match: "Tips coffin", qty: 1 }, { match: "Molde esculpidas", qty: 1 },
        { match: "Acrílico clear", qty: 1 }, { match: "Acrílico Cover", qty: 1 },
        { match: "Acrílico blanco 1/2", qty: 1 }, { match: "Pincel 100% kolinsky", qty: 1 },
        { match: "Monomero 30ml", qty: 1 },
    ],
    "Kit Retiro": [
        { match: "Broca desbaste Staleks", qty: 1 },
    ],
};

function App() {
    const [products, setProducts] = useState([]);
    const [kits, setKits] = useState([]);
    const [currentKitId, setCurrentKitId] = useState(null);
    const [showPrices, setShowPrices] = useState(true);
    const [showCosts, setShowCosts] = useState(false);
    const [newKitName, setNewKitName] = useState('');
    const [showNewKitForm, setShowNewKitForm] = useState(false);
    const [searchTerm, setSearchTerm] = useState('');
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [categoryFilter, setCategoryFilter] = useState('Todos');
    const [view, setView] = useState('kits');
    const [editingProduct, setEditingProduct] = useState(null);
    const [showAddProduct, setShowAddProduct] = useState(false);
    const [showBulkImport, setShowBulkImport] = useState(false);
    const [bulkText, setBulkText] = useState('');
    const [newProduct, setNewProduct] = useState({ name: '', category: 'Productos', cost: '', price: '' });
    const [prodSearch, setProdSearch] = useState('');

    useEffect(() => { loadData(); }, []);

    const loadData = async () => {
        setLoading(true);
        try {
            const { data: prods } = await supabase.from('products').select('*').order('name');
            setProducts(prods || []);
            const { data: kitsData } = await supabase.from('kits').select('*, kit_items(*)').order('created_at');
            setKits(kitsData || []);
        } catch (e) { alert("Error al cargar: " + e.message); }
        setLoading(false);
    };

    const findProduct = (m) => products.find(p => p.name.toLowerCase().includes(m.toLowerCase()));

    const createKitFromTemplate = async (name) => {
        setSaving(true);
        try {
            const { data: kit } = await supabase.from('kits').insert({ user_id: USER_ID, name, is_template: false }).select().single();
            const items = [];
            for (const t of KIT_TEMPLATES[name]) {
                const p = findProduct(t.match);
                if (p) items.push({ kit_id: kit.id, product_id: p.id, quantity: t.qty });
            }
            if (items.length) await supabase.from('kit_items').insert(items);
            await loadData();
            setCurrentKitId(kit.id);
        } catch (e) { alert("Error: " + e.message); }
        setSaving(false);
    };

    const createEmptyKit = async (name) => {
        setSaving(true);
        try {
            const { data: kit } = await supabase.from('kits').insert({ user_id: USER_ID, name, is_template: false }).select().single();
            await loadData();
            setCurrentKitId(kit.id);
        } catch (e) { alert("Error: " + e.message); }
        setSaving(false);
    };

    const deleteKit = async (id) => {
        if (!confirm("¿Eliminar este kit?")) return;
        await supabase.from('kits').delete().eq('id', id);
        await loadData();
        if (currentKitId === id) setCurrentKitId(null);
    };

    const addProductToKit = async (kitId, productId) => {
        const kit = kits.find(k => k.id === kitId);
        const existing = kit.kit_items.find(i => i.product_id === productId);
        if (existing) {
            await supabase.from('kit_items').update({ quantity: existing.quantity + 1 }).eq('id', existing.id);
        } else {
            await supabase.from('kit_items').insert({ kit_id: kitId, product_id: productId, quantity: 1 });
        }
        await loadData();
    };

    const updateQuantity = async (itemId, qty) => {
        if (qty <= 0) await supabase.from('kit_items').delete().eq('id', itemId);
        else await supabase.from('kit_items').update({ quantity: qty }).eq('id', itemId);
        await loadData();
    };

    const removeItem = async (itemId) => {
        await supabase.from('kit_items').delete().eq('id', itemId);
        await loadData();
    };

    const saveProductEdit = async () => {
        try {
            await supabase.from('products').update({
                name: editingProduct.name,
                category: editingProduct.category,
                cost: parseFloat(editingProduct.cost) || 0,
                price: parseFloat(editingProduct.price) || 0,
            }).eq('id', editingProduct.id);
            setEditingProduct(null);
            await loadData();
        } catch (e) { alert("Error: " + e.message); }
    };

    const addNewProduct = async () => {
        if (!newProduct.name.trim()) { alert("El nombre es obligatorio"); return; }
        try {
            await supabase.from('products').insert({
                name: newProduct.name.trim(),
                category: newProduct.category || 'Productos',
                cost: parseFloat(newProduct.cost) || 0,
                price: parseFloat(newProduct.price) || 0,
            });
            setNewProduct({ name: '', category: 'Productos', cost: '', price: '' });
            setShowAddProduct(false);
            await loadData();
        } catch (e) { alert("Error: " + e.message + " (¿nombre duplicado?)"); }
    };

    const deleteProduct = async (id) => {
        if (!confirm("¿Eliminar este producto? Se quitará de todos los kits.")) return;
        await supabase.from('products').delete().eq('id', id);
        await loadData();
    };

    const doBulkImport = async () => {
        const lines = bulkText.split('\n').map(l => l.trim()).filter(l => l);
        const toInsert = [];
        for (const line of lines) {
            const parts = line.split(/[\t|,;]/).map(s => s.trim());
            if (parts[0]) {
                toInsert.push({
                    name: parts[0],
                    cost: parseFloat((parts[1] || '0').replace(',', '.')) || 0,
                    price: parseFloat((parts[2] || '0').replace(',', '.')) || 0,
                    category: parts[3] || 'Productos',
                });
            }
        }
        if (!toInsert.length) { alert("No se detectaron productos válidos"); return; }
        if (!confirm(`¿Importar ${toInsert.length} productos?`)) return;
        try {
            let ok = 0, dup = 0;
            for (const p of toInsert) {
                const { error } = await supabase.from('products').insert(p);
                if (error) dup++; else ok++;
            }
            alert(`✓ Importados: ${ok}\n⚠ Duplicados/omitidos: ${dup}`);
            setBulkText('');
            setShowBulkImport(false);
            await loadData();
        } catch (e) { alert("Error: " + e.message); }
    };

    const currentKit = kits.find(k => k.id === currentKitId);
    const getProductById = (id) => products.find(p => p.id === id);

    const calculateTotals = (kit) => {
        let subtotal = 0, totalCost = 0;
        (kit.kit_items || []).forEach(item => {
            const p = getProductById(item.product_id);
            if (p) { subtotal += parseFloat(p.price) * item.quantity; totalCost += parseFloat(p.cost) * item.quantity; }
        });
        const iva = subtotal * 0.15;
        return { subtotal, iva, total: subtotal + iva, totalCost, profit: (subtotal + iva) - totalCost };
    };

    const exportPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const t = calculateTotals(currentKit);
        doc.setFontSize(20); doc.setTextColor(219, 39, 119); doc.text("Seycare", 14, 20);
        doc.setFontSize(14); doc.setTextColor(50, 50, 50); doc.text(currentKit.name, 14, 30);
        doc.setFontSize(9); doc.setTextColor(120, 120, 120); doc.text(new Date().toLocaleString('es-EC'), 14, 36);
        const head = showPrices ? [['Producto', 'Cant.', 'P. Unit.', 'Subtotal']] : [['Producto', 'Cant.']];
        const body = (currentKit.kit_items || []).map(item => {
            const p = getProductById(item.product_id);
            if (!p) return null;
            return showPrices
                ? [p.name, item.quantity, `$${parseFloat(p.price).toFixed(2)}`, `$${(parseFloat(p.price)*item.quantity).toFixed(2)}`]
                : [p.name, item.quantity];
        }).filter(Boolean);
        doc.autoTable({ head, body, startY: 42, headStyles: { fillColor: [219, 39, 119] }, styles: { fontSize: 9 } });
        if (showPrices) {
            let y = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(11); doc.setTextColor(50, 50, 50);
            doc.text(`Subtotal: $${t.subtotal.toFixed(2)}`, 140, y);
            doc.text(`IVA (15%): $${t.iva.toFixed(2)}`, 140, y + 6);
            doc.setFontSize(13); doc.setTextColor(37, 99, 235);
            doc.text(`TOTAL: $${t.total.toFixed(2)}`, 140, y + 14);
        }
        doc.save(`${currentKit.name.replace(/\s/g, '_')}.pdf`);
    };

    const exportExcel = () => {
        const t = calculateTotals(currentKit);
        const rows = (currentKit.kit_items || []).map(item => {
            const p = getProductById(item.product_id);
            if (!p) return null;
            const row = { Producto: p.name, Cantidad: item.quantity };
            if (showPrices) {
                row['Precio Unit.'] = parseFloat(p.price);
                row['Subtotal'] = parseFloat(p.price) * item.quantity;
                if (showCosts) { row['Costo Unit.'] = parseFloat(p.cost); row['Costo Total'] = parseFloat(p.cost) * item.quantity; }
            }
            return row;
        }).filter(Boolean);
        if (showPrices) {
            rows.push({});
            rows.push({ Producto: 'Subtotal', Subtotal: t.subtotal });
            rows.push({ Producto: 'IVA 15%', Subtotal: t.iva });
            rows.push({ Producto: 'TOTAL', Subtotal: t.total });
            if (showCosts) {
                rows.push({ Producto: 'Costo Total', Subtotal: t.totalCost });
                rows.push({ Producto: 'Ganancia', Subtotal: t.profit });
            }
        }
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Cotización");
        XLSX.writeFile(wb, `${currentKit.name.replace(/\s/g, '_')}.xlsx`);
    };

    const categories = ['Todos', ...new Set(products.map(p => p.category))];
    const filteredProducts = products.filter(p => {
        const s = p.name.toLowerCase().includes(searchTerm.toLowerCase());
        const c = categoryFilter === 'Todos' || p.category === categoryFilter;
        return s && c;
    });
    const productListFiltered = products.filter(p => p.name.toLowerCase().includes(prodSearch.toLowerCase()));

    if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="text-center"><div className="text-4xl mb-4">🎀</div><p>Cargando...</p></div></div>;

    return (
        <div className="min-h-screen bg-gradient-to-b from-pink-50 to-white p-4">
            <div className="max-w-6xl mx-auto">
                <div className="mb-4 flex justify-between items-center no-print flex-wrap gap-2">
                    <div>
                        <h1 className="text-2xl font-bold text-gray-800">🎀 Seycare Kits</h1>
                        <p className="text-gray-600 text-xs">{products.length} productos {saving && <span className="text-blue-500">· 💾 Guardando...</span>}</p>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setView('kits')} className={`px-3 py-2 rounded text-sm font-medium ${view==='kits'?'bg-pink-500 text-white':'bg-white border'}`}>Kits</button>
                        <button onClick={() => setView('products')} className={`px-3 py-2 rounded text-sm font-medium ${view==='products'?'bg-pink-500 text-white':'bg-white border'}`}>Productos</button>
                        <button onClick={loadData} className="px-3 py-2 bg-gray-200 rounded text-sm">🔄</button>
                    </div>
                </div>

                {view === 'products' ? (
                    <div className="bg-white rounded-lg shadow-md p-4">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h2 className="text-lg font-bold">Gestión de Productos</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setShowAddProduct(true)} className="px-3 py-2 bg-green-500 text-white rounded text-sm">+ Producto</button>
                                <button onClick={() => setShowBulkImport(true)} className="px-3 py-2 bg-blue-500 text-white rounded text-sm">📋 Importar Grupo</button>
                            </div>
                        </div>
                        <input type="text" placeholder="Buscar producto..." value={prodSearch} onChange={e=>setProdSearch(e.target.value)} className="w-full px-3 py-2 border rounded mb-4 text-sm" />
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead><tr className="border-b-2">
                                    <th className="text-left py-2 px-2">Nombre</th>
                                    <th className="text-left py-2 px-2 w-28">Categoría</th>
                                    <th className="text-right py-2 px-2 w-20">Costo</th>
                                    <th className="text-right py-2 px-2 w-20">Precio</th>
                                    <th className="w-20"></th>
                                </tr></thead>
                                <tbody>
                                    {productListFiltered.map(p => (
                                        <tr key={p.id} className="border-b hover:bg-gray-50">
                                            <td className="py-2 px-2">{p.name}</td>
                                            <td className="py-2 px-2 text-gray-500 text-xs">{p.category}</td>
                                            <td className="py-2 px-2 text-right">${parseFloat(p.cost).toFixed(2)}</td>
                                            <td className="py-2 px-2 text-right font-semibold">${parseFloat(p.price).toFixed(2)}</td>
                                            <td className="py-2 px-2 text-center">
                                                <button onClick={()=>setEditingProduct({...p, cost:p.cost, price:p.price})} className="text-blue-500 mr-2">✏️</button>
                                                <button onClick={()=>deleteProduct(p.id)} className="text-red-500">🗑️</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                ) : (
                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                        <div className="lg:col-span-1 no-print">
                            <div className="bg-white rounded-lg shadow-md p-4">
                                <h2 className="text-base font-bold mb-3">Crear Kit</h2>
                                <div className="space-y-1 mb-3 max-h-48 overflow-y-auto">
                                    {Object.keys(KIT_TEMPLATES).map(name => (
                                        <button key={name} onClick={()=>createKitFromTemplate(name)} disabled={saving} className="w-full text-left px-2 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded text-xs font-medium disabled:opacity-50">+ {name}</button>
                                    ))}
                                </div>
                                {showNewKitForm ? (
                                    <div className="space-y-2 mb-3">
                                        <input type="text" value={newKitName} onChange={e=>setNewKitName(e.target.value)} placeholder="Nombre" className="w-full px-2 py-1 border rounded text-sm" />
                                        <div className="flex gap-1">
                                            <button onClick={()=>{if(newKitName.trim()){createEmptyKit(newKitName);setNewKitName('');setShowNewKitForm(false);}}} className="flex-1 px-2 py-1 bg-green-500 text-white rounded text-xs">Crear</button>
                                            <button onClick={()=>{setShowNewKitForm(false);setNewKitName('');}} className="flex-1 px-2 py-1 bg-gray-300 rounded text-xs">Cancelar</button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={()=>setShowNewKitForm(true)} className="w-full px-2 py-1.5 bg-green-500 text-white rounded text-xs font-medium mb-3">+ Kit Personalizado</button>
                                )}
                                <div className="border-t pt-2">
                                    <p className="text-xs font-semibold text-gray-600 mb-2 uppercase">Mis Kits ({kits.length})</p>
                                    <div className="space-y-1 max-h-72 overflow-y-auto">
                                        {kits.map(kit => (
                                            <div key={kit.id} className={`p-2 rounded cursor-pointer ${currentKitId===kit.id?'bg-pink-200':'bg-gray-100 hover:bg-gray-200'}`}>
                                                <div onClick={()=>setCurrentKitId(kit.id)} className="font-medium text-xs">{kit.name}</div>
                                                <div className="flex justify-between items-center mt-1">
                                                    <span className="text-xs text-gray-600">{(kit.kit_items||[]).length} items</span>
                                                    <button onClick={()=>deleteKit(kit.id)} className="text-red-500 text-xs">🗑️</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="border-t mt-2 pt-2 space-y-1">
                                    <button onClick={()=>setShowPrices(!showPrices)} className="w-full px-2 py-1.5 bg-gray-200 rounded text-xs">{showPrices?'👁️ Ocultar':'🙈 Mostrar'} Precios</button>
                                    {showPrices && <button onClick={()=>setShowCosts(!showCosts)} className="w-full px-2 py-1.5 bg-gray-100 rounded text-xs">{showCosts?'Ocultar':'Mostrar'} Costos/Ganancia</button>}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-3">
                            {currentKit ? (
                                <div className="bg-white rounded-lg shadow-md p-5" id="print-area">
                                    <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                        <h2 className="text-xl font-bold">{currentKit.name}</h2>
                                        <div className="flex gap-2 no-print">
                                            <button onClick={exportPDF} className="px-3 py-2 bg-red-500 text-white rounded text-sm">📄 PDF</button>
                                            <button onClick={exportExcel} className="px-3 py-2 bg-green-600 text-white rounded text-sm">📊 Excel</button>
                                            <button onClick={()=>window.print()} className="px-3 py-2 bg-blue-500 text-white rounded text-sm">🖨️</button>
                                        </div>
                                    </div>
                                    <div className="mb-4 p-3 bg-gray-50 rounded no-print">
                                        <p className="text-sm font-semibold mb-2">Agregar Productos</p>
                                        <input type="text" placeholder="Buscar..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full px-2 py-1.5 border rounded mb-2 text-sm" />
                                        <div className="flex gap-1 mb-2 flex-wrap">
                                            {categories.map(cat => (
                                                <button key={cat} onClick={()=>setCategoryFilter(cat)} className={`px-2 py-0.5 rounded text-xs ${categoryFilter===cat?'bg-blue-500 text-white':'bg-white border'}`}>{cat}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-1 max-h-44 overflow-y-auto">
                                            {filteredProducts.map(p => (
                                                <button key={p.id} onClick={()=>addProductToKit(currentKit.id, p.id)} className="text-left px-2 py-1.5 bg-white border rounded hover:border-blue-500 hover:bg-blue-50 text-xs">
                                                    <div className="font-medium">{p.name}</div>
                                                    {showPrices && <div className="text-gray-600">${parseFloat(p.price).toFixed(2)}</div>}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    {(currentKit.kit_items||[]).length === 0 ? (
                                        <div className="text-center py-10 text-gray-500">Kit vacío. Agrega productos arriba.</div>
                                    ) : (
                                        <>
                                            <div className="overflow-x-auto mb-4">
                                                <table className="w-full text-sm">
                                                    <thead><tr className="border-b-2">
                                                        <th className="text-left py-2 px-2">Producto</th>
                                                        <th className="text-center py-2 px-2 w-24">Cant.</th>
                                                        {showPrices && <th className="text-right py-2 px-2 w-20">Precio</th>}
                                                        {showPrices && showCosts && <th className="text-right py-2 px-2 w-20 text-gray-500">Costo</th>}
                                                        {showPrices && <th className="text-right py-2 px-2 w-24">Subtotal</th>}
                                                        <th className="w-8 no-print"></th>
                                                    </tr></thead>
                                                    <tbody>
                                                        {(currentKit.kit_items||[]).map(item => {
                                                            const p = getProductById(item.product_id);
                                                            if (!p) return null;
                                                            return (
                                                                <tr key={item.id} className="border-b">
                                                                    <td className="py-2 px-2">{p.name}</td>
                                                                    <td className="py-2 px-2 text-center">
                                                                        <div className="flex items-center justify-center gap-1">
                                                                            <button onClick={()=>updateQuantity(item.id, item.quantity-1)} className="px-2 hover:bg-gray-200 rounded no-print">−</button>
                                                                            <span className="w-6 text-center font-semibold">{item.quantity}</span>
                                                                            <button onClick={()=>updateQuantity(item.id, item.quantity+1)} className="px-2 hover:bg-gray-200 rounded no-print">+</button>
                                                                        </div>
                                                                    </td>
                                                                    {showPrices && <td className="py-2 px-2 text-right">${parseFloat(p.price).toFixed(2)}</td>}
                                                                    {showPrices && showCosts && <td className="py-2 px-2 text-right text-gray-500 text-xs">${parseFloat(p.cost).toFixed(2)}</td>}
                                                                    {showPrices && <td className="py-2 px-2 text-right font-semibold">${(parseFloat(p.price)*item.quantity).toFixed(2)}</td>}
                                                                    <td className="py-2 px-2 text-center no-print"><button onClick={()=>removeItem(item.id)} className="text-red-500">✕</button></td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                            {(() => {
                                                const t = calculateTotals(currentKit);
                                                return (
                                                    <div className="bg-gradient-to-r from-gray-50 to-pink-50 p-4 rounded-lg border">
                                                        {showPrices ? (
                                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                                                <div><p className="text-xs text-gray-600 uppercase">Subtotal</p><p className="text-lg font-bold">${t.subtotal.toFixed(2)}</p></div>
                                                                <div><p className="text-xs text-gray-600 uppercase">IVA 15%</p><p className="text-lg font-bold text-amber-600">${t.iva.toFixed(2)}</p></div>
                                                                <div><p className="text-xs text-gray-600 uppercase">Total</p><p className="text-2xl font-bold text-blue-600">${t.total.toFixed(2)}</p></div>
                                                                {showCosts && <><div><p className="text-xs text-gray-600 uppercase">Costo Total</p><p className="text-base font-bold text-red-600">${t.totalCost.toFixed(2)}</p></div>
                                                                <div><p className="text-xs text-gray-600 uppercase">Ganancia</p><p className="text-base font-bold text-green-600">${t.profit.toFixed(2)}</p></div>
                                                                <div><p className="text-xs text-gray-600 uppercase">Margen</p><p className="text-base font-bold text-green-600">{t.total>0?((t.profit/t.total)*100).toFixed(0):0}%</p></div></>}
                                                            </div>
                                                        ) : (
                                                            <div className="text-center text-gray-500">Precios ocultos · {(currentKit.kit_items||[]).length} productos</div>
                                                        )}
                                                    </div>
                                                );
                                            })()}
                                        </>
                                    )}
                                </div>
                            ) : (
                                <div className="bg-white rounded-lg shadow-md p-10 text-center no-print">
                                    <div className="text-4xl mb-3">🎀</div>
                                    <p className="text-gray-600">Selecciona o crea un kit.</p>
                                </div>
                            )}
                        </div>
                    </div>
                )}
            </div>

            {editingProduct && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={()=>setEditingProduct(null)}>
                    <div className="bg-white rounded-lg p-5 w-full max-w-md" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-lg font-bold mb-4">Editar Producto</h3>
                        <label className="block text-xs font-semibold text-gray-600 mb-1">Nombre</label>
                        <input type="text" value={editingProduct.name} onChange={e=>setEditingProduct({...editingProduct, name:e.target.value})} className="w-full px-3 py-2 border rounded mb-3 text-sm" />
                        <label className="block text-xs font-semibold text-gray-600 mb-1">Categoría</label>
                        <input type="text" value={editingProduct.category} onChange={e=>setEditingProduct({...editingProduct, category:e.target.value})} className="w-full px-3 py-2 border rounded mb-3 text-sm" />
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="block text-xs font-semibold text-gray-600 mb-1">Costo</label>
                            <input type="number" step="0.01" value={editingProduct.cost} onChange={e=>setEditingProduct({...editingProduct, cost:e.target.value})} className="w-full px-3 py-2 border rounded text-sm" /></div>
                            <div><label className="block text-xs font-semibold text-gray-600 mb-1">Precio</label>
                            <input type="number" step="0.01" value={editingProduct.price} onChange={e=>setEditingProduct({...editingProduct, price:e.target.value})} className="w-full px-3 py-2 border rounded text-sm" /></div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={saveProductEdit} className="flex-1 px-3 py-2 bg-green-500 text-white rounded text-sm font-medium">Guardar</button>
                            <button onClick={()=>setEditingProduct(null)} className="flex-1 px-3 py-2 bg-gray-300 rounded text-sm">Cancelar</button>
                        </div>
                    </div>
                </div>
            )}

            {showAddProduct && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={()=>setShowAddProduct(false)}>
                    <div className="bg-white rounded-lg p-5 w-full max-w-md" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-lg font-bold mb-4">Nuevo Producto</h3>
                        <label className="block text-xs font-semibold text-gray-600 mb-1">Nombre *</label>
                        <input type="text" value={newProduct.name} onChange={e=>setNewProduct({...newProduct, name:e.target.value})} className="w-full px-3 py-2 border rounded mb-3 text-sm" />
                        <label className="block text-xs font-semibold text-gray-600 mb-1">Categoría</label>
                        <input type="text" value={newProduct.category} onChange={e=>setNewProduct({...newProduct, category:e.target.value})} className="w-full px-3 py-2 border rounded mb-3 text-sm" />
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="block text-xs font-semibold text-gray-600 mb-1">Costo</label>
                            <input type="number" step="0.01" value={newProduct.cost} onChange={e=>setNewProduct({...newProduct, cost:e.target.value})} className="w-full px-3 py-2 border rounded text-sm" /></div>
                            <div><label className="block text-xs font-semibold text-gray-600 mb-1">Precio</label>
                            <input type="number" step="0.01" value={newProduct.price} onChange={e=>setNewProduct({...newProduct, price:e.target.value})} className="w-full px-3 py-2 border rounded text-sm" /></div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={addNewProduct} className="flex-1 px-3 py-2 bg-green-500 text-white rounded text-sm font-medium">Agregar</button>
                            <button onClick={()=>setShowAddProduct(false)} className="flex-1 px-3 py-2 bg-gray-300 rounded text-sm">Cancelar</button>
                        </div>
                    </div>
                </div>
            )}

            {showBulkImport && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={()=>setShowBulkImport(false)}>
                    <div className="bg-white rounded-lg p-5 w-full max-w-lg" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-lg font-bold mb-2">Importar Productos en Grupo</h3>
                        <p className="text-xs text-gray-600 mb-3">Un producto por línea. Formato:<br/><code className="bg-gray-100 px-1">Nombre | Costo | Precio | Categoría</code><br/>Separa con | o coma o tab. Costo, Precio y Categoría son opcionales.</p>
                        <textarea value={bulkText} onChange={e=>setBulkText(e.target.value)} rows={10} placeholder={"Esmalte rojo | 1.50 | 3.00 | Productos\nBase gel | 2 | 4\nTop coat, 2, 4, Productos"} className="w-full px-3 py-2 border rounded mb-4 text-sm font-mono" />
                        <div className="flex gap-2">
                            <button onClick={doBulkImport} className="flex-1 px-3 py-2 bg-blue-500 text-white rounded text-sm font-medium">Importar</button>
                            <button onClick={()=>setShowBulkImport(false)} className="flex-1 px-3 py-2 bg-gray-300 rounded text-sm">Cancelar</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
