<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seycare Kits - Cotizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #d1d5db #f3f4f6; }
        *::-webkit-scrollbar { width: 6px; height: 6px; }
        *::-webkit-scrollbar-track { background: #f3f4f6; }
        *::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-pink-50 to-white">

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// === CONFIGURACIÓN SUPABASE ===
const SUPABASE_URL = "https://yaxdcfrvcmkrwunpkpyj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGRjZnJ2Y21rcnd1bnBrcHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Mjk2MDEsImV4cCI6MjA5NTEwNTYwMX0.ZGO3b6WuoaBRGjjrRIgsVStlLc1Xr7nYfCyt4mEQDyo";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ID de usuario fijo (compartido - todos ven los mismos kits)
const USER_ID = "00000000-0000-0000-0000-000000000001";

// === TEMPLATES DE KITS (por nombre de producto) ===
// El texto debe coincidir (parcial) con el nombre en la BD
const KIT_TEMPLATES = {
    "Kit Limpieza y Esmaltado": [
        { match: "Drill GN", qty: 1 },
        { match: "Palito de naranjo", qty: 1 },
        { match: "Broca flama", qty: 1 },
        { match: "Tijera para tips y molde", qty: 1 },
        { match: "Cepillo limpieza", qty: 1 },
        { match: "Lima 180/240 mineral", qty: 3 },
        { match: "Lámpara UV/LED 48W", qty: 1 },
        { match: "Top Brillante", qty: 1 },
        { match: "Base coat", qty: 1 },
    ],
    "Kit Polygel": [
        { match: "Polygel GN", qty: 1 },
        { match: "Pincel/espátula polygel", qty: 1 },
        { match: "Lámpara portátil", qty: 1 },
    ],
    "Kit Acrílico": [
        { match: "Monomero 30ml", qty: 1 },
        { match: "Acrílico Cover", qty: 1 },
        { match: "Pincel acrílico (sintético)", qty: 1 },
        { match: "Tips coffin", qty: 1 },
    ],
    "Kit Profesional Completo": [
        { match: "Drill GN", qty: 1 },
        { match: "Palito de naranjo", qty: 2 },
        { match: "Fresa Flama Staleks", qty: 1 },
        { match: "Tijera cutícula 51", qty: 1 },
        { match: "Alicate para cutícula 30", qty: 1 },
        { match: "Lima 180/180 mineral", qty: 1 },
        { match: "Lima 180/240 mineral", qty: 1 },
        { match: "Lima 150/150 mineral", qty: 1 },
        { match: "Wipes Staleks", qty: 1 },
        { match: "Cepillo limpieza", qty: 1 },
        { match: "Lámpara UV/LED 48W", qty: 1 },
        { match: "Deshidratador", qty: 1 },
        { match: "Adherente", qty: 1 },
        { match: "Base coat", qty: 1 },
        { match: "Base Rubber Transparente", qty: 1 },
        { match: "Gel de construcción Linda", qty: 1 },
        { match: "Top Brillante", qty: 1 },
        { match: "Top matte", qty: 1 },
    ],
    "Sistema Polygel Completo": [
        { match: "Tips coffin", qty: 1 },
        { match: "Molde esculpidas", qty: 1 },
        { match: "Polygel GN", qty: 1 },
        { match: "Polygel linda", qty: 1 },
        { match: "Pincel/espátula polygel", qty: 1 },
    ],
    "Sistema Acrílico Completo": [
        { match: "Tips coffin", qty: 1 },
        { match: "Molde esculpidas", qty: 1 },
        { match: "Acrílico clear", qty: 1 },
        { match: "Acrílico Cover", qty: 1 },
        { match: "Acrílico blanco 1/2", qty: 1 },
        { match: "Pincel 100% kolinsky", qty: 1 },
        { match: "Monomero 30ml", qty: 1 },
    ],
    "Kit Retiro": [
        { match: "Broca desbaste Staleks", qty: 1 },
    ],
};

function App() {
    const [products, setProducts] = useState([]);
    const [kits, setKits] = useState([]);
    const [currentKitId, setCurrentKitId] = useState(null);
    const [showPrices, setShowPrices] = useState(true);
    const [showCosts, setShowCosts] = useState(true);
    const [newKitName, setNewKitName] = useState('');
    const [showNewKitForm, setShowNewKitForm] = useState(false);
    const [searchTerm, setSearchTerm] = useState('');
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [categoryFilter, setCategoryFilter] = useState('Todos');

    // Cargar productos y kits al inicio
    useEffect(() => {
        loadData();
    }, []);

    const loadData = async () => {
        setLoading(true);
        try {
            // Cargar productos
            const { data: prods, error: prodError } = await supabase
                .from('products')
                .select('*')
                .order('name');
            if (prodError) throw prodError;
            setProducts(prods || []);

            // Cargar kits con sus items
            const { data: kitsData, error: kitsError } = await supabase
                .from('kits')
                .select('*, kit_items(*)')
                .order('created_at');
            if (kitsError) throw kitsError;
            setKits(kitsData || []);
        } catch (e) {
            console.error("Error cargando:", e);
            alert("Error al cargar datos: " + e.message);
        }
        setLoading(false);
    };

    const findProduct = (matchText) => {
        return products.find(p => 
            p.name.toLowerCase().includes(matchText.toLowerCase())
        );
    };

    const createKitFromTemplate = async (templateName) => {
        setSaving(true);
        try {
            // Crear kit
            const { data: kit, error: kitError } = await supabase
                .from('kits')
                .insert({ user_id: USER_ID, name: templateName, is_template: false })
                .select()
                .single();
            if (kitError) throw kitError;

            // Agregar items del template
            const template = KIT_TEMPLATES[templateName];
            const itemsToInsert = [];
            for (const t of template) {
                const product = findProduct(t.match);
                if (product) {
                    itemsToInsert.push({
                        kit_id: kit.id,
                        product_id: product.id,
                        quantity: t.qty
                    });
                }
            }
            if (itemsToInsert.length > 0) {
                const { error: itemsError } = await supabase
                    .from('kit_items')
                    .insert(itemsToInsert);
                if (itemsError) throw itemsError;
            }

            await loadData();
            setCurrentKitId(kit.id);
        } catch (e) {
            alert("Error creando kit: " + e.message);
        }
        setSaving(false);
    };

    const createEmptyKit = async (name) => {
        setSaving(true);
        try {
            const { data: kit, error } = await supabase
                .from('kits')
                .insert({ user_id: USER_ID, name, is_template: false })
                .select()
                .single();
            if (error) throw error;
            await loadData();
            setCurrentKitId(kit.id);
        } catch (e) {
            alert("Error: " + e.message);
        }
        setSaving(false);
    };

    const deleteKit = async (id) => {
        if (!confirm("¿Eliminar este kit?")) return;
        setSaving(true);
        try {
            await supabase.from('kits').delete().eq('id', id);
            await loadData();
            if (currentKitId === id) setCurrentKitId(null);
        } catch (e) {
            alert("Error: " + e.message);
        }
        setSaving(false);
    };

    const addProductToKit = async (kitId, productId) => {
        const kit = kits.find(k => k.id === kitId);
        const existing = kit.kit_items.find(i => i.product_id === productId);
        try {
            if (existing) {
                await supabase.from('kit_items')
                    .update({ quantity: existing.quantity + 1 })
                    .eq('id', existing.id);
            } else {
                await supabase.from('kit_items')
                    .insert({ kit_id: kitId, product_id: productId, quantity: 1 });
            }
            await loadData();
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    const updateQuantity = async (itemId, newQty) => {
        try {
            if (newQty <= 0) {
                await supabase.from('kit_items').delete().eq('id', itemId);
            } else {
                await supabase.from('kit_items')
                    .update({ quantity: newQty })
                    .eq('id', itemId);
            }
            await loadData();
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    const removeItem = async (itemId) => {
        try {
            await supabase.from('kit_items').delete().eq('id', itemId);
            await loadData();
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    const currentKit = kits.find(k => k.id === currentKitId);

    const getProductById = (id) => products.find(p => p.id === id);

    const calculateTotals = (kit) => {
        let subtotal = 0, totalCost = 0;
        (kit.kit_items || []).forEach(item => {
            const p = getProductById(item.product_id);
            if (p) {
                subtotal += parseFloat(p.price) * item.quantity;
                totalCost += parseFloat(p.cost) * item.quantity;
            }
        });
        const iva = subtotal * 0.15;
        return { subtotal, iva, total: subtotal + iva, totalCost, profit: (subtotal + iva) - totalCost };
    };

    const categories = ['Todos', ...new Set(products.map(p => p.category))];

    const filteredProducts = products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase());
        const matchCat = categoryFilter === 'Todos' || p.category === categoryFilter;
        return matchSearch && matchCat;
    });

    if (loading) {
        return (
            <div className="min-h-screen flex items-center justify-center">
                <div className="text-center">
                    <div className="text-4xl mb-4">🎀</div>
                    <p className="text-gray-600">Cargando Seycare Kits...</p>
                </div>
            </div>
        );
    }

    return (
        <div className="min-h-screen bg-gradient-to-b from-pink-50 to-white p-4">
            <div className="max-w-6xl mx-auto">
                <div className="mb-6 flex justify-between items-center no-print">
                    <div>
                        <h1 className="text-3xl font-bold text-gray-800">🎀 Seycare Kits</h1>
                        <p className="text-gray-600 text-sm">
                            {products.length} productos · Sincronizado en la nube
                            {saving && <span className="ml-2 text-blue-500">💾 Guardando...</span>}
                        </p>
                    </div>
                    <button onClick={loadData} className="px-3 py-2 bg-gray-200 rounded text-sm hover:bg-gray-300">
                        🔄 Actualizar
                    </button>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                    {/* SIDEBAR */}
                    <div className="lg:col-span-1 no-print">
                        <div className="bg-white rounded-lg shadow-md p-4">
                            <h2 className="text-lg font-bold mb-3 text-gray-800">Crear Kit</h2>
                            <div className="space-y-2 mb-4">
                                {Object.keys(KIT_TEMPLATES).map(name => (
                                    <button
                                        key={name}
                                        onClick={() => createKitFromTemplate(name)}
                                        disabled={saving}
                                        className="w-full text-left px-3 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded text-sm font-medium transition disabled:opacity-50"
                                    >
                                        + {name}
                                    </button>
                                ))}
                            </div>

                            {showNewKitForm ? (
                                <div className="space-y-2 mb-4">
                                    <input
                                        type="text"
                                        value={newKitName}
                                        onChange={(e) => setNewKitName(e.target.value)}
                                        placeholder="Nombre del kit"
                                        className="w-full px-2 py-1 border rounded text-sm"
                                    />
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => {
                                                if (newKitName.trim()) {
                                                    createEmptyKit(newKitName);
                                                    setNewKitName('');
                                                    setShowNewKitForm(false);
                                                }
                                            }}
                                            className="flex-1 px-2 py-1 bg-green-500 text-white rounded text-sm"
                                        >Crear</button>
                                        <button
                                            onClick={() => { setShowNewKitForm(false); setNewKitName(''); }}
                                            className="flex-1 px-2 py-1 bg-gray-300 rounded text-sm"
                                        >Cancelar</button>
                                    </div>
                                </div>
                            ) : (
                                <button
                                    onClick={() => setShowNewKitForm(true)}
                                    className="w-full px-3 py-2 bg-green-500 text-white rounded text-sm font-medium hover:bg-green-600 mb-4"
                                >+ Kit Personalizado</button>
                            )}

                            <div className="border-t pt-3">
                                <p className="text-xs font-semibold text-gray-600 mb-2 uppercase">Mis Kits ({kits.length})</p>
                                <div className="space-y-2 max-h-80 overflow-y-auto">
                                    {kits.map(kit => (
                                        <div
                                            key={kit.id}
                                            className={`p-2 rounded cursor-pointer transition ${
                                                currentKitId === kit.id ? 'bg-pink-200' : 'bg-gray-100 hover:bg-gray-200'
                                            }`}
                                        >
                                            <div onClick={() => setCurrentKitId(kit.id)} className="font-medium text-sm">
                                                {kit.name}
                                            </div>
                                            <div className="flex justify-between items-center mt-1">
                                                <span className="text-xs text-gray-600">
                                                    {(kit.kit_items || []).length} items
                                                </span>
                                                <button
                                                    onClick={() => deleteKit(kit.id)}
                                                    className="text-red-500 text-xs hover:text-red-700"
                                                >🗑️</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="border-t mt-3 pt-3 space-y-2">
                                <button
                                    onClick={() => setShowPrices(!showPrices)}
                                    className="w-full px-3 py-2 bg-gray-200 rounded text-sm hover:bg-gray-300"
                                >{showPrices ? '👁️ Ocultar' : '🙈 Mostrar'} Precios</button>
                                {showPrices && (
                                    <button
                                        onClick={() => setShowCosts(!showCosts)}
                                        className="w-full px-3 py-2 bg-gray-100 rounded text-xs hover:bg-gray-200"
                                    >{showCosts ? 'Ocultar' : 'Mostrar'} Costos/Ganancia</button>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* MAIN */}
                    <div className="lg:col-span-3">
                        {currentKit ? (
                            <div className="bg-white rounded-lg shadow-md p-6" id="print-area">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800">{currentKit.name}</h2>
                                    <button
                                        onClick={() => window.print()}
                                        className="px-4 py-2 bg-blue-500 text-white rounded font-medium hover:bg-blue-600 no-print"
                                    >🖨️ Imprimir</button>
                                </div>

                                {/* Agregar productos */}
                                <div className="mb-6 p-4 bg-gray-50 rounded no-print">
                                    <p className="text-sm font-semibold text-gray-700 mb-3">Agregar Productos</p>
                                    <input
                                        type="text"
                                        placeholder="Buscar..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full px-3 py-2 border rounded mb-2 text-sm"
                                    />
                                    <div className="flex gap-1 mb-3 flex-wrap">
                                        {categories.map(cat => (
                                            <button
                                                key={cat}
                                                onClick={() => setCategoryFilter(cat)}
                                                className={`px-2 py-1 rounded text-xs ${
                                                    categoryFilter === cat ? 'bg-blue-500 text-white' : 'bg-white border'
                                                }`}
                                            >{cat}</button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-52 overflow-y-auto">
                                        {filteredProducts.map(product => (
                                            <button
                                                key={product.id}
                                                onClick={() => addProductToKit(currentKit.id, product.id)}
                                                className="text-left px-3 py-2 bg-white border rounded hover:border-blue-500 hover:bg-blue-50 text-sm"
                                            >
                                                <div className="font-medium text-gray-800 text-xs">{product.name}</div>
                                                {showPrices && (
                                                    <div className="text-xs text-gray-600">${parseFloat(product.price).toFixed(2)}</div>
                                                )}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Items */}
                                {(currentKit.kit_items || []).length === 0 ? (
                                    <div className="text-center py-12 text-gray-500">
                                        <p>Kit vacío. Agrega productos arriba.</p>
                                    </div>
                                ) : (
                                    <>
                                        <div className="overflow-x-auto mb-6">
                                            <table className="w-full text-sm">
                                                <thead>
                                                    <tr className="border-b-2 border-gray-300">
                                                        <th className="text-left py-2 px-2 font-semibold">Producto</th>
                                                        <th className="text-center py-2 px-2 font-semibold w-24">Cant.</th>
                                                        {showPrices && <th className="text-right py-2 px-2 font-semibold w-20">Precio</th>}
                                                        {showPrices && showCosts && <th className="text-right py-2 px-2 font-semibold w-20 text-gray-500">Costo</th>}
                                                        {showPrices && <th className="text-right py-2 px-2 font-semibold w-24">Subtotal</th>}
                                                        <th className="w-10 no-print"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {(currentKit.kit_items || []).map(item => {
                                                        const p = getProductById(item.product_id);
                                                        if (!p) return null;
                                                        return (
                                                            <tr key={item.id} className="border-b border-gray-200">
                                                                <td className="py-2 px-2">{p.name}</td>
                                                                <td className="py-2 px-2 text-center">
                                                                    <div className="flex items-center justify-center gap-1">
                                                                        <button onClick={() => updateQuantity(item.id, item.quantity - 1)} className="px-2 hover:bg-gray-200 rounded no-print">−</button>
                                                                        <span className="w-8 text-center font-semibold">{item.quantity}</span>
                                                                        <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="px-2 hover:bg-gray-200 rounded no-print">+</button>
                                                                    </div>
                                                                </td>
                                                                {showPrices && <td className="py-2 px-2 text-right">${parseFloat(p.price).toFixed(2)}</td>}
                                                                {showPrices && showCosts && <td className="py-2 px-2 text-right text-gray-500 text-xs">${parseFloat(p.cost).toFixed(2)}</td>}
                                                                {showPrices && <td className="py-2 px-2 text-right font-semibold">${(parseFloat(p.price) * item.quantity).toFixed(2)}</td>}
                                                                <td className="py-2 px-2 text-center no-print">
                                                                    <button onClick={() => removeItem(item.id)} className="text-red-500 hover:text-red-700">✕</button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>

                                        {(() => {
                                            const t = calculateTotals(currentKit);
                                            return (
                                                <div className="bg-gradient-to-r from-gray-50 to-pink-50 p-5 rounded-lg border">
                                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                                        {showPrices && (
                                                            <>
                                                                <div>
                                                                    <p className="text-xs text-gray-600 uppercase">Subtotal</p>
                                                                    <p className="text-xl font-bold text-gray-800">${t.subtotal.toFixed(2)}</p>
                                                                </div>
                                                                <div>
                                                                    <p className="text-xs text-gray-600 uppercase">IVA 15%</p>
                                                                    <p className="text-xl font-bold text-amber-600">${t.iva.toFixed(2)}</p>
                                                                </div>
                                                                <div>
                                                                    <p className="text-xs text-gray-600 uppercase">Total</p>
                                                                    <p className="text-2xl font-bold text-blue-600">${t.total.toFixed(2)}</p>
                                                                </div>
                                                                {showCosts && (
                                                                    <>
                                                                        <div>
                                                                            <p className="text-xs text-gray-600 uppercase">Costo Total</p>
                                                                            <p className="text-lg font-bold text-red-600">${t.totalCost.toFixed(2)}</p>
                                                                        </div>
                                                                        <div>
                                                                            <p className="text-xs text-gray-600 uppercase">Ganancia</p>
                                                                            <p className="text-lg font-bold text-green-600">${t.profit.toFixed(2)}</p>
                                                                        </div>
                                                                        <div>
                                                                            <p className="text-xs text-gray-600 uppercase">Margen</p>
                                                                            <p className="text-lg font-bold text-green-600">{t.total > 0 ? ((t.profit/t.total)*100).toFixed(0) : 0}%</p>
                                                                        </div>
                                                                    </>
                                                                )}
                                                            </>
                                                        )}
                                                        {!showPrices && (
                                                            <div className="col-span-3 text-center text-gray-500">
                                                                Precios ocultos · {(currentKit.kit_items || []).length} productos
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </>
                                )}
                            </div>
                        ) : (
                            <div className="bg-white rounded-lg shadow-md p-12 text-center no-print">
                                <div className="text-4xl mb-4">🎀</div>
                                <p className="text-gray-600 mb-4">Selecciona un kit o crea uno nuevo.</p>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
